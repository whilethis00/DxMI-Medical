# FM Gate v2 실험
# 목적: v1 대비 두 가지 변경만 적용
#   (1) energy_clamp=6.0 — ep20 collapse 및 ∇rw spike 방어
#       근거: 정상 학습 구간 e±≈5이므로 6.0은 평상시엔 거의 안 걸리고
#             e_neg_std 폭발(±4 이상) 시점에만 clamp가 개입함
#   (2) sep monitoring 수정 코드 (irl.py) — gate 이후에도 sep_std_ema 지속 업데이트
#
# v1과 달라진 것: energy_clamp null → 6.0
# 나머지 하이퍼파라미터 전부 v1과 동일 (seed=1)
#
# 실행:
#   CUDA_VISIBLE_DEVICES=0,1 torchrun --nproc_per_node=2 scripts/train.py \
#       --config configs/ebm_fm_gate_v2.yaml --seed 1

experiment:
  name: ebm_fm_gate_v2
  description: "FM gate v2 — v1 + energy_clamp=6.0 + sep monitoring fix"
  type: irl

data:
  splits_dir: data/splits
  patch_size: 48
  batch_size: 4
  num_workers: 4

model:
  type: irl
  base_ch: 32

ebm:
  sgld_steps: 60
  sgld_step_size: 0.01
  sgld_noise_scale: 0.01
  replay_buffer_size: 10000
  replay_prob: 0.95

training:
  epochs: 30
  reward_lr: 1.0e-4
  fm_lr: 1.0e-4
  weight_decay: 1.0e-5
  l2_reg: 0.1
  energy_clamp: 20.0       # v1: null → v2: 20.0 (spike 방어)
                           # 6.0은 초기화 시 EBM 출력(-30~-50)이 전부 clamped → gradient 사망
                           # 정상 학습 구간 e±≈5이므로 20.0은 평상시 안 걸리고 spike만 잡음
  grad_clip: 1.0
  reward_steps_per_iter: 3
  fm_steps_per_iter: 10
  policy_sample_steps: 32
  policy_grad_steps: 2
  reward_weight: 0.05
  early_stop_patience: 0

  reward_cd_weight: 1.0
  reward_cd_temp: 1.0

  sgld_permanent_ratio: 0.3
  fm_gate_sep_std_threshold: 40.0
  fm_gate_consecutive: 2
  fm_gate_check_interval: 50
  fm_gate_probe_size: 16
  fm_gate_warmup_steps: 570
  sep_std_ema_alpha: 0.1

logging:
  log_interval: 10
  save_interval: 1
  save_best_val: true
  output_dir: outputs/ebm_fm_gate_v2
